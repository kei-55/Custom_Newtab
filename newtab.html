<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Custom New Tab</title>
  <link rel="stylesheet" href="styles.css">
  <script src="Sortable.min.js"></script>
</head>
<body>
  <main class="page">
    <header id="dashboard-header" class="dashboard-header" aria-label="ダッシュボード情報">
      <div class="dashboard-hero">
        <p class="eyebrow">New Tab Dashboard</p>
        <h1>今日の作業をひと目で開く</h1>
        <p class="dashboard-subtitle">
          時刻、日付、統計、背景状態をまとめて確認できます。
        </p>
      </div>

      <div class="dashboard-metrics">
        <article class="metric-card metric-card--time">
          <span class="metric-label">時刻</span>
          <strong id="current-time" class="metric-value">--:--</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">日付</span>
          <strong id="current-date" class="metric-value">----</strong>
        </article>
        <article class="metric-card metric-card--status">
          <span class="metric-label">背景状態</span>
          <strong id="background-status" class="metric-value">未設定</strong>
        </article>
        <article class="metric-card metric-card--status">
          <span class="metric-label">最終更新</span>
          <strong id="last-updated" class="metric-value">--</strong>
        </article>
      </div>

      <div class="progress-card">
        <div class="progress-card__meta">
          <span class="metric-label">月間進行率</span>
          <span id="month-progress-label" class="progress-card__value">0%</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="month-progress-bar" class="progress-fill"></div>
        </div>
      </div>
    </header>

    <section class="search-panel" aria-label="検索">
      <label class="visually-hidden" for="google-search">Google 検索</label>
      <input
        type="text"
        id="google-search"
        placeholder="Google で検索する"
        autocomplete="off"
      >
      <div class="filter-row">
        <label class="visually-hidden" for="shortcut-filter">ショートカットを絞り込む</label>
        <input
          type="text"
          id="shortcut-filter"
          class="filter-input"
          placeholder="ショートカットを絞り込む"
          autocomplete="off"
        >
      </div>
    </section>

    <section id="pinned-shortcuts" class="shortcut-section shortcut-section--pinned" aria-label="固定ショートカット">
      <div class="section-header">
        <h2>固定ショートカット</h2>
        <span id="pinned-shortcut-count" class="section-chip">0</span>
      </div>
      <div id="pinned-container" class="shortcut-stack" aria-live="polite"></div>
      <div id="pinned-empty-state" class="section-empty">
        固定したショートカットはここに表示されます。
      </div>
    </section>

    <section id="regular-shortcuts" class="shortcut-section shortcut-section--regular shortcuts-panel" aria-label="通常ショートカット">
      <div class="section-header">
        <h2 id="shortcuts-section-title">通常ショートカット</h2>
        <div class="section-header__counts">
          <span id="shortcut-count" class="section-chip">0/0</span>
          <span id="regular-shortcut-count" class="section-chip section-chip--soft">0</span>
        </div>
      </div>
      <div class="shortcut-stack" aria-live="polite">
        <div id="shortcut-container"></div>
      </div>
      <p id="empty-state" class="empty-state" hidden>
        まだショートカットがありません。「ショートカット追加」から登録できます。
      </p>
    </section>

    <div class="toolbar">
      <div class="button-container">
        <button id="add-shortcut" type="button">ショートカット追加</button>
      </div>
      <button id="background-settings-button" class="settings-button" type="button">
        背景
      </button>
    </div>
  </main>

  <div id="background-settings-popup" class="popup" hidden>
    <div class="popup-content popup-content-wide" role="dialog" aria-modal="true" aria-labelledby="background-popup-title">
      <h2 id="background-popup-title">背景を変更</h2>
      <p>背景色または画像URLを設定できます。</p>
      <label class="field-label" for="background-color">背景色</label>
      <input type="color" id="background-color" class="field-input field-input-color">
      <label class="field-label" for="background-image">背景画像URL</label>
      <input type="text" id="background-image" class="field-input" placeholder="https://example.com/image.jpg">
      <div class="popup-actions">
        <button id="apply-background" class="button-primary" type="button">適用</button>
        <button id="reset-background" class="button-danger" type="button">リセット</button>
        <button id="close-background-settings" class="button-neutral" type="button">閉じる</button>
      </div>
    </div>
  </div>

  <div id="shortcut-modal" class="popup" hidden>
    <div
      class="popup-content popup-content-wide"
      role="dialog"
      aria-modal="true"
      aria-labelledby="shortcut-modal-title"
    >
      <h2 id="shortcut-modal-title">ショートカットを追加</h2>
      <p>名前、URL、ピン留めをまとめて編集できます。</p>
      <form id="shortcut-form" class="shortcut-form">
        <label class="field-label" for="shortcut-name-input">名前</label>
        <input type="text" id="shortcut-name-input" class="field-input" placeholder="例: GitHub">
        <label class="field-label" for="shortcut-url-input">URL</label>
        <input type="text" id="shortcut-url-input" class="field-input" placeholder="https://github.com">
        <label class="toggle-row" for="shortcut-pinned">
          <input type="checkbox" id="shortcut-pinned">
          <span>ピン留めする</span>
        </label>
        <div class="popup-actions">
          <button id="shortcut-submit" class="button-primary" type="submit">保存</button>
          <button id="shortcut-cancel" class="button-neutral" type="button">キャンセル</button>
        </div>
      </form>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
